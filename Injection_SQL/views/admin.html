<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f4f4; }
    .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h2 { color: #333; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    button { padding: 10px 20px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #d32f2f; }
    .info { margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Panel de Administración</h2>
    <p>Bienvenido, <strong id="username"></strong>. Aquí puedes ver todos los usuarios registrados.</p>
    <table id="userTable">
      <thead>
        <tr><th>ID</th><th>Usuario</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    <button id="logoutBtn">Cerrar sesión</button>
    <div class="info">
      <p><a href="/">Volver al inicio</a></p>
    </div>
  </div>

  <script>
    async function cargarUsuarios() {
      const res = await fetch('/admin/usuarios');
      if (res.status === 403) {
        alert('Acceso denegado. Redirigiendo al login.');
        window.location.href = '/';
        return;
      }
      const usuarios = await res.json();
      const tbody = document.querySelector('#userTable tbody');
      tbody.innerHTML = '';
      usuarios.forEach(u => {
        const row = `<tr><td>${u.id}</td><td>${u.username}</td></tr>`;
        tbody.innerHTML += row;
      });
    }

    async function obtenerSesion() {
      const res = await fetch('/session');
      const data = await res.json();
      if (!data.user) {
        window.location.href = '/';
      } else {
        document.getElementById('username').textContent = data.user;
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/logout', { method: 'POST' });
      window.location.href = '/';
    });

    // Cargar datos
    obtenerSesion();
    cargarUsuarios();
  </script>
</body>
</html>
